front:
  text: 太上慈悲道場滅罪水懴卷中爾時慈尊言七月十五日中元地官主録百司上詣天闕進呈世人罪福之籍今日道場懴主某是故回向中元地界一切聖哲皈依皈神皈身皈命大慈大悲無上天尊
  hash: sha256:1988a85873cf30fd8d8bfcb0a0217c59e953efe79c4362c8c76dd347751008e7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0248_HFL_002-001a, image: hfl/0301/0301-094.png}
body:
  text: 至心朝禮上淸靈寶天尊至心朝禮九幽拔罪天尊至心朝禮高上通明天尊至心朝禮空惠凝常天尊至心朝禮方便善救天尊至心朝禮通真感應天尊至心朝禮衆善惠施天尊至心朝禮和光忍辱天尊至心朝禮凝神玄覺天尊至心朝禮轉輪運行天尊從此巳上禮念天尊聖號乞懴某自從無始以來至於今日師資父母存亡眷屬無量慳貪愛吝之罪或見人教化作善建功或見貧窮疾病不能减割方便扶持種種不能布施慳貪等罪無量無邊今日䖍誠咸乞懴悔次復回向中元地界一切真聖皈依皈神皈身皈命大慈大悲無上天尊至心朝禮大慈無我天尊至心朝禮運化微明天尊至心朝禮靈通品量天尊至心朝禮大惠衆善天尊至心朝禮海量無涯天尊至心朝禮興國太平天尊至心朝禮光妙高玄天尊至心朝禮常住虛極天尊至心朝禮玄微德本天尊至心朝禮輝靈度命天尊從此巳上禮念天尊聖號乞懴某自從無始以來至於今日師資父母六親存殁無量無邊嗔怒之罪或嗔怒天尊經法法師道士或嗔怒帝王官宰父母骨肉或嗔怒道埸法席作諸功德或嗔怒隂陽風雨寒暑或嗔怒虛空日月星宿尊聖或嗔怒正直鬼神過往賢聖或嗔怒春夏秋冬晝夜長短或嗔怒士農工商鰥寡孤獨囚徒禁役貧苦老病或嗔怒門朋志友妻子奴婢或嗔怒牛馬六畜飛禽走獸一切物命如是嗔怒等罪無量無邊今日䖍誠咸乞懴悔次復回向中元地界一切聖哲皈依皈神皈身皈命大慈大悲無上天尊至心朝禮㑹善開宗天尊至心朝禮妙空真相天尊至心朝禮舍弘品量天尊至心朝禮智藏微達天尊至心朝禮惠解空寂天尊至心朝禮普照微玄天尊至心朝禮法空虛凝天尊至心朝禮天寶自在天尊至心朝禮平等善應天尊至心朝禮光明濟物天尊徙此巳上禮念天尊聖號乞懴某自從無始以來至於今日六親眷屬存亡二世有無量無邊不信善惡因緣愚癡執見或於三寶之前常行愚癡或於帝王官宰之前常行愚癡或於父毋骨肉之前常行愚癡或於人物所處之前常行愚癡如是愚癡等罪無量無邊今日䖍誠咸乞懴悔次復回向中元地界一切聖哲皈依皈神皈身皈命大慈大悲無上天尊至心朝禮淸微通悟天尊至心朝禮大明空界天尊至心朝禮高淸妙惠天尊至心朝禮開緣普救天尊至心朝禮光明萬變天尊至心朝禮紫虛玄聖天尊至心朝禮飛空智聖天尊至心朝禮梵寶太虛天尊至心朝禮元靈等觀天尊至心朝禮海空辨惠天尊從此巳上禮念天尊聖號乞懴某自從無始以來至於今日師資父母六親骨肉無量無邊綺言妄語之罪或背前面後口是心非或向此說彼或向彼說此離人骨肉或破人良友或不思已過不察情由論人是非說人長短不識人義掩善揚惡訕謗君王父母平薄師資尊長破壞忠良埋沒勝已讃詠邪音誹謗正教如是綺言妄語兩舌等罪無量無邊今日䖍誠咸乞懴悔次復回向中元地界一切聖賢皈依皈神皈身皈命大慈大悲無上天尊至心朝禮尊勝妙果天尊至心朝禮善願普因天尊至心朝禮希微威德天尊至心朝禮慈悲護度天尊至心朝禮端靖梵行天尊至心朝禮善成淸淨天尊至心朝禮仙靈正行天尊至心朝禮慈施興善天尊至心朝禮威力難思天尊至心朝禮隨緣應化天尊從此巳上禮念天尊聖號乞懴某自從無始以來至於今日師資父母六親眷屬無量無邊罵詈之罪或罵詈天尊大道之罪或罵詈經法法師之罪或罵詈國王官宰之罪或罵詈知識朋友之罪或罵詈妻妾男女之罪或罵詈六親眷屬之罪或罵詈根相不全六疾百病之罪或罵詈貧窮老小鰥寡孤獨奴婢下賤之罪或罵詈天地日月星辰風雨雲霞虹霓雷電之罪或罵詈晝夜長短冬寒夏熱四時八節霜雪氣候之罪或罵詈正直鬼神蟲蝗水旱之罪或罵詈五穀百果絲麻布絹之罪或罵詈牛馬六畜飛禽走獸蠢動之類或囚禁罪人愚癡良善如是言詞粗獷呼天呌地牽引鬼神毀罵等罪無量無邊今日䖍誠咸乞懴悔次復回向中元地界一切聖哲皈依皈神皈身皈命大慈大悲無上天尊至心朝禮香林定想天尊至心朝禮無為普濟天尊至心朝禮保命上生天尊至心朝禮至德無礙天尊至心朝禮平等救苦天尊至心朝禮演聖開元天尊至心朝禮六通證悟天尊至心朝禮分形通德天尊至心朝禮寶頂大成天尊至心朝禮至真幽寂天尊從此巳上禮念天尊聖號乞懴某身中種種罪業伏乞九淸三洞慈尊五老十華大道皇皇上帝列列高真九帝仙官十宫真宰三元大帝五嶽尊神福地洞天酆都岱嶽四司曹吏九府朝班物外羣仙壷中衆聖洪恩普洽惠澤滂流釋解塵愆消除世厄哀矜庶品開度幽冥世世生生咸躋大道太上慈悲道場滅罪水懴卷中
