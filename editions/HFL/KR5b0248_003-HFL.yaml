front:
  text: 太上慈悲道場滅罪水懴卷下爾時慈尊言十月十五日下元水官主録百司上詣天闕進呈世人罪福之籍今日道場懴主某是故回向下元水界一切仙哲皈依皈神皈身皈命大慈大悲無上天尊
  hash: sha256:77429a363ed537046459c60cdc194046b4ec93e2ddee2557cc7fee9b35c2d8f1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5b0248_HFL_003-001a, image: hfl/0301/0301-108.png}
body:
  text: 至心朝禮太清道德天尊至心朝禮應見常容天尊至心朝禮妙保上眞天尊至心朝禮還魂起死天尊至心朝禮威權自在天尊至心朝禮安鎭含識天尊至心朝禮壽命無窮天尊至心朝禮常善救物天尊至心朝禮含弘德化天尊至心朝禮發生萬物天尊從此巳上禮念天尊聖號乞懴某自從無始以來至於今日師資父母六親眷屬無量無邊障礙人間種種之罪又復行商坐賈買賣博貨邸舎交易升斗秤尺分毫銖兩之上有諸増損瞞昧於人或將麤易好以短換長虧筭人物穿破墻壁劫掠竊盗或塞斷道路抵諱債負或放財本與人過分取利或假託非術脫人財物或妬人聦明富貴恃官協勢告人長短或暗施弓箭不合神明或飲酒食肉五辛三厭穢慢功德或爲官爲吏治事不公或居上不恭爲下不敬朝廷無爵郷黨無齒如是等罪無量無邊今日䖍誠咸乞懴悔次復回向下元水界一切仙哲皈依皈神皈身皈命大慈大悲無上天尊至心朝禮演法混成天尊至心朝禮法澤流布天尊至心朝禮積功成聖天尊至心朝禮凝神照境天尊至心朝禮和神利物天尊至心朝禮妙解羅網天尊至心朝禮功行圎滿天尊至心朝禮還功報德天尊至心朝禮隱跡全道天尊至心朝禮紫霞浮蓋天尊從此巳上禮念天尊聖號乞懴悔某目從無始以來至於今日父母師資存亡二世道俗兩門一切眷屬或浮好三寳執心不專或負背師資違盟負約或不忠國主不順時機不崇大道輕欺教法或穢汚江河撈摝百川取諸魚鱗將充口味或不生慚愧輕賤衣食抛撒五穀咒詛牛馬損害蠶蛾不惜農桑或見利忘義不廉不恥喜新棄舊知恩不報如是等罪無量無邊今日䖍誠咸乞懴悔次復回向下元水界一切仙聖皈依皈神皈身皈命大慈大悲無上天尊至心朝禮尊妙無雙天尊至心朝禮玉京垂惠天尊至心朝禮寳度應權天尊至心朝禮太微光梵天尊至心朝禮眞相滿足天尊至心朝禮尊勝無爲天尊至心朝禮沖和淨樂天尊至心朝禮寂然無碍天尊至心朝禮幽源不測天尊至心朝禮黙念無爲天尊從此巳上禮念天尊聖號乞懴某自從無始以來至於今日存亡二世道俗兩門不思父母劬勞養育不報十月懷躭三年乳哺回乾就濕嚥苦吐甘洗浣提撕憂愛重恩返生五逆不孝重罪或爲男爲女爲氣爲財殢酒迷花爲冤結咒連累父母怨氣無邊或造宅剏墳犯多禁忌罪盈惡貫是致流殃或報在冢訟徴呼先亡句連或報在命運衰危惡星行度見世創爲種種花報地獄則爲種種果報慈尊言如此生身果報皆因前世犯於罪業死經地獄及至來生受報六道輪廻無有休息今日䖍誠咸乞懴悔次復回向下元水界一切仙哲皈依皈神皈身皈命大慈大悲無上天尊至心朝禮功業無邊天尊至心朝禮法雨霶𩃱天尊至心朝禮廣大圎滿天尊至心朝禮哀悲衆苦天尊至心朝禮凝空法藏天尊至心朝禮無碍惠王天尊至心朝禮隨縁應化天尊至心朝禮洞明世界天尊至心朝禮應變無常天尊至心朝禮弘慈大量天尊從此巳上禮念天尊聖號乞懴某自從無始以來至於今日種種罪業爾時慈尊復言吾見下土兆民多有凶禍邪鬼所害可爲先亡祖考父母尊親五臘之日是天地開赦冝建齋醮行道禮懴上章救拔先亡咸得超度正月一日天臘之日五帝神仙集於青天安寳華林靑龍闕中校定世人罪福之籍五月五日地臘之日五帝神仙集於丹天梵寳昌陽丹臺闕中校定世人罪福之籍七月七日道德臘之日五帝神仙集於素天金門素靈闕中校定世人罪福之籍十月一日民歳臘之日五帝神仙集於玄天洞隂黒靈闕中校定世人罪福之籍十二月遇臘是王侯臘之日五帝神仙集於玄都玉京元靈戊巳金闕元始八景殿中校定世人罪福之籍此日皆是合攢之日定吉凶生死簿籍皆是生人九祖父母幽獄鬼魂此日爲酆都北帝引出責問久處隂司年代積逺罪結釁由端及子孫姓名墳墓所在如積劫未有追贖因此日延累生人引問子孫親姻九族姓名爲生人罪狀積釁幽都九族延滅此日可爲亡故父母上表謝罪懴悔追拔皆令亡人一一得之常日祭祀不可得達蓋爲酆都幽深難爲通徹沐賴眞猷皆得宿愆解釋幽司不欲久滯死魂久滯則天曹責及幽司官吏亦責及生人轉福爲禍災難自此而生若有至孝男女此日修奉齋醮則黒籍除名皆得超度今日道場懴主某是故回向下元水界一切仙哲皈依皈神皈身皈命大慈大悲無上天尊至心朝禮赴感隨縁天尊至心朝禮梵行修功天尊至心朝禮洞鑒無碍天尊至心朝禮赴難垂恩天尊至心朝禮日月光明天尊至心朝禮無滯着相天尊至心朝禮無方化度天尊至心朝禮常慈愛憐天尊至心朝禮無量法身天尊至心朝禮周應法身天尊從此巳上禮念天尊聖號乞懴某自從無始以來至於今日六親眷屬存亡二世輪廻六道因縁四生捨身不閑不歇優饒三業恣縱六情殺盗邪淫貪癡嗔怒惡口兩舌妄言綺語不信因縁不行方便辜天負地破齋犯戒情故外人返謀師父爲冤結咒引鬼牽神不念四生豈思一息種種爲報念念成非緫在身中無由雪釋或墮地獄或爲畜生不值聖文何能超度如是等罪無量無邊今日䖍誠咸乞懴悔次復回向下元水界一切仙哲皈依皈神皈身皈命大慈大悲無上天尊至心朝禮玉寳皇上天尊至心朝禮玄眞萬福天尊至心朝禮太妙至極天尊至心朝禮玄上玉宸天尊至心朝禮度仙上聖天尊至心朝禮好生度命天尊至心朝禮太靈虚皇天尊至心朝禮無量太華天尊至心朝禮玉虚明皇天尊至心朝禮眞皇洞神天尊從此巳上禮念天尊聖號乞懴某種種罪業伏乞三境慈尊十方至聖三元大帝五老高眞一百二十曹七十二府四司五帝八海九江十二河源一切仙哲普開救度大設慈悲垂大法雲散大法雨消除熱惱洗滌愆非頓爾清涼了然雲淨見存積慶巳徃超昇國安民豐歡樂太平功滿德就生生悟道世世聞經一切有情咸躋道岸太上慈悲道場滅罪水懴卷下
