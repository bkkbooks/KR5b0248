body:
  text: 至心朝禮玉淸元始天尊至心朝禮福生無量天尊至心朝禮消災解厄天尊至心朝禮延壽益筭天尊至心朝禮長生保命天尊至心朝禮紫淸降福天尊至心朝禮八卦護身天尊至心朝禮九宫捍厄天尊至心朝禮高眞妙果天尊至心朝禮十方靈寳天尊從此巳上禮念天尊聖號乞懴某自從無始以來至於今日師資父母六親眷屬三業所爲六根所造是故身貪細滑意起虚妄眼觀惡色耳聽邪音鼻好惡香舌貪滋味心生嫉妬口出穢言如是等罪無量無邊今日䖍誠咸乞懴悔次復回向上元天界一切高眞皈依皈神皈身皈命大慈大悲無上天尊至心朝禮靑靈始老天尊至心朝禮丹靈眞老天尊至心朝禮皓靈皇老天尊至心朝禮五靈玄老天尊至心朝禮玄靈元老天尊至心朝禮嚴淨法惠天尊至心朝禮應感威力天尊至心朝禮無畏梵形天尊至心朝禮大智惠海天尊至心朝禮無量法藏天尊從此巳上禮念天尊聖號乞懴某自從無始以來至於今日師資父母六親眷屬無量無邊殺生之罪或殺猪羊牛馬雞犬鵝鴨或殺飛禽走獸水族魚鱗蠢動含靈一切物命或扶持疾病淫祀鬼神殺害衆生或遊獵好戯耕田掘地養蠶煑繭放火放水燒糞掃地殺害衆生或飲酒食肉或作醬鮓焚樵露燈熱湯潑地殺害衆生或生分子母斷其胎育或殺胎𡖉或殺衆生命無頭數或殺債主冤家四方良善或因爭競欺妬攘取劫奪殺害或因征戰讒侫方便殺害或用邪教埋名釘字呪詛殺害或爲官法枉殺人命或圖他財寳證人入死或奪人妻子爭人夫婿遂成殺害或對天地日月虚空廟社之所殺害或上引祖先以爲盟誓殺害或男婚女嫁吉凶聚㑹生男誕女接奉親朋非時作樂躭色好淫眠花卧桞殺害無數逐使怨氣遍滿虚空如是殺害等罪無量無邊今日䖍誠咸乞懴悔次復回向上元天界一切高眞皈依皈神皈身皈命大慈大悲無上天尊至心朝禮大慈萬善天尊至心朝禮玄微自在天尊至心朝禮無邊明覺天尊至心朝禮慈和妙寳天尊至心朝禮端嚴威力天尊至心朝禮昭明上照天尊至心朝禮法橋大度天尊至心朝禮弘通保命天尊至心朝禮開顯妙門天尊至心朝禮護魂慈救天尊從此巳上禮念天尊聖號乞懴某自從無始以來至於今日七祖九玄師資父母存亡二世一切眷屬無量偷盗之罪或偷盗天尊形像三寳種種財物或偷盗慈親種種財物或偷盗富貴貧賤種種財物或偷盗國家庫藏輸貢科歛官錢財物或偷盗妻妾男女良賤財物如是偷盗等罪無量無邊今日䖍誠咸乞懴悔次復回向上元天界一切高眞皈依皈神皈身皈命大慈大悲無上天尊至心朝禮流光法喜天尊至心朝禮威聖化凢天尊至心朝禮洞靈慈念天尊至心朝禮慈惠縁成天尊至心朝禮増益聖智天尊至心朝禮功德嚴淨天尊至心朝禮混成長樂天尊至心朝禮寳光善寂天尊至心朝禮相光自在天尊至心朝禮金眞度命天尊從此巳上禮念天尊聖號乞懴某自從無始以來至於今日存亡二世一切眷屬無量婬慾之罪或不避虚空日月星辰之下行諸婬慾或不避井竈門戸社廟官觀聖跡之所行諸婬慾或六親通同行諸婬慾或婬犯骨肉或染汚出家欺凌貞潔捉人殘害奪人恩愛行諸婬慾或不顧老少穢亂羇迷愚癡不返如是邪婬愛慾等罪無量無邊今日䖍誠咸乞懴悔次復回向上元天界一切高眞皈依皈神皈身皈命大慈大悲無上天尊至心朝禮淸微天帝天尊至心朝禮禹餘天帝天尊至心朝禮大赤天帝天尊至心朝禮金惠玄通天尊至心朝禮垂慈溥濟天尊至心朝禮洞暢高玄天尊至心朝禮長生萬善天尊至心朝禮眞遊高上天尊至心朝禮法流逺洽天尊至心朝禮高德寳藏天尊從此巳上禮念天尊聖號乞懴某自從無始以來至於今日七祖九玄師資父母存亡二世一切眷屬傏𠊲上眞之罪或不敬上天日月星辰之罪或不畏風雨雲霞雷電或瞻對北斗不避諸天赤身裸體大小便利披頭飲食涕吐穢言戲笑哭泣種種乖非如是觸犯等罪無量無邊今日䖍誠咸乞懴悔次復回向上元天界一切高眞皈依皈神皈身皈命大慈大悲無上天尊至心朝禮凝常轉命天尊至心朝禮玄德定願天尊至心朝禮緫眞應見天尊至心朝禮妙成圎行天尊至心朝禮龍德威嚴天尊至心朝禮高玄太素天尊至心朝禮靈眞大帝天尊至心朝禮金資妙相天尊至心朝禮開明指要天尊至心朝禮無上最勝天尊從此巳上禮念天尊聖號乞懴某身中所爲種種業障伏乞無極大道太上三尊五老高眞十華上帝日月星宿璇璣玉衡八十一天三十二帝三官九府四司三界魔王飛天大聖未來仙宰巳徃眞官大慈大悲普濟普度恩波滌罪惠澤除冤五道停酸三元集福功滿德就與道合眞一切有情齊登道岸無上虚皇證眞三寳太上慈悲道場滅罪水懴卷上
