front:
  text: 太上慈悲道場滅罪水懴卷上中下同卷木十一爾時元始天尊在大羅天上玉京金闕紫微天臺大㑹羣仙敷揚妙法救度天人咸使悟道不歷諸苦施大威力放大光明普照萬國一切罪福俱在目前甚深微妙方便開度一切地獄窮魂苦毒無量痛楚難言並蒙救拔不溺沈淪咸得超度是時元始慈尊慈悲廣演更開要道使過去未來俱霑利益再告左右侍真曰人之禀生同資一氣及乎誕育命係三元夭壽吉凶富貴貧賤因緣罪福善惡生死各逐夙命根源悉有報應隨其業力永不差殊如影隨形似聲應谷每年三元之日三元官屬與三界十方四司五帝善惡童子一切靈官上朝金闕元始御前考校男女生死之籍罪福因緣及九幽地獄水府窮魂姓名業簿此時若有善信男女能發自然道意建造紫微寶臺玉京寶山樓閣臺榭百寶粧嚴香花供養燒香行道吟詠洞章然燈放生步虛法事布施發願謝過上章大建齊醮䖍告天地晝夜不怠者吾當遣十方天尊真人諸天神仙三界四司救苦靈童下降人間齊到道場為其滅罪保佑生人使國土安寧男女歡泰衆善齊降諸惡不生地獄苦魂一時解脫竟生天上快樂無為功德巍巍獲福無量慈尊言正月十五日上元天官主録百司上詣天闕進呈世人罪福之籍今日道場懴主某是故回向上元天界一切高真皈依皈神皈身皈命大慈大悲無上天尊
